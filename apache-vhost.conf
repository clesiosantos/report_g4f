# Adicione estas linhas dentro do seu VirtualHost existente em /etc/httpd/conf.d/glpi.conf

Alias /report /var/www/html/rda/dist

<Directory /var/www/html/rda/dist>
    Options Indexes FollowSymLinks
    AllowOverride All
    Require all granted

    # Roteamento para Single Page Application dentro de /report
    RewriteEngine On
    RewriteBase /report/
    RewriteRule ^index\.html$ - [L]
    RewriteCond %{REQUEST_FILENAME} !-f
    RewriteCond %{REQUEST_FILENAME} !-d
    RewriteCond %{REQUEST_FILENAME} !-l
    RewriteRule . /report/index.html [L]
</Directory>