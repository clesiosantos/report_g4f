# Exemplo de configuração para o arquivo de sites do Apache (ex: /etc/apache2/sites-available/rda.conf)

<VirtualHost *:80>
    ServerName fisco.g4f.sharksolucoes.com.br
    
    # Redirecionar para HTTPS (opcional, mas recomendado)
    Redirect permanent / https://fisco.g4f.sharksolucoes.com.br/
</VirtualHost>

<VirtualHost *:443>
    ServerName fisco.g4f.sharksolucoes.com.br
    
    # Caminho para a pasta 'dist' gerada após o build (npm run build)
    DocumentRoot /var/www/html/seu-projeto/dist

    <Directory /var/www/html/seu-projeto/dist>
        Options Indexes FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    # Configurações de SSL (ajuste conforme seus certificados)
    SSLEngine on
    SSLCertificateFile /etc/letsencrypt/live/fisco.g4f.sharksolucoes.com.br/fullchain.pem
    SSLCertificateKeyFile /etc/letsencrypt/live/fisco.g4f.sharksolucoes.com.br/privkey.pem

    ErrorLog ${APACHE_LOG_DIR}/rda_error.log
    CustomLog ${APACHE_LOG_DIR}/rda_access.log combined
</VirtualHost>