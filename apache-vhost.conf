# Adicione ou substitua no seu arquivo /etc/httpd/conf.d/glpi.conf

# Configuração para o Portal RDA (Substituindo o proxy atual)
<VirtualHost *:80>
    ServerName dashfisco.g4f.sharksolucoes.com.br
    DocumentRoot /var/www/html/rda/dist

    <Directory /var/www/html/rda/dist>
        Options Indexes FollowSymLinks
        AllowOverride All
        Require all granted

        # Roteamento para Single Page Application (React)
        RewriteEngine On
        RewriteBase /
        RewriteRule ^index\.html$ - [L]
        RewriteCond %{REQUEST_FILENAME} !-f
        RewriteCond %{REQUEST_FILENAME} !-d
        RewriteCond %{REQUEST_FILENAME} !-l
        RewriteRule . /index.html [L]
    </Directory>

    # Redirecionamento para HTTPS (Certbot costuma cuidar disso, mas aqui está o manual)
    RewriteEngine on
    RewriteCond %{SERVER_NAME} =dashfisco.g4f.sharksolucoes.com.br
    RewriteRule ^ https://%{SERVER_NAME}%{REQUEST_URI} [END,NE,R=permanent]
</VirtualHost>

# Nota: Mantenha sua configuração do VirtualHost *:443 do dashfisco 
# mas altere o DocumentRoot e remova o ProxyPass, apontando para:
# DocumentRoot /var/www/html/rda/dist