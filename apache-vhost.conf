# Arquivo: /etc/httpd/conf.d/report.conf

<VirtualHost *:80>
    ServerName seu-servidor.petro.local
    
    # DocumentRoot padrão do servidor
    DocumentRoot "/var/www/html"

    # Alias para garantir que o contexto /report aponte para o link simbólico
    Alias /report "/var/www/report"

    <Directory "/var/www/report">
        # Permite seguir o link simbólico para /data/report_g4f/dist
        Options +FollowSymLinks
        AllowOverride All
        Require all granted

        # Configuração de roteamento para Single Page Application (SPA)
        <IfModule mod_rewrite.c>
            RewriteEngine On
            
            # Define a base como /report/ para coincidir com o build do Vite
            RewriteBase /report/
            
            # Se o arquivo ou diretório solicitado existir, serve ele diretamente (ex: .js, .css, imagens)
            RewriteCond %{REQUEST_FILENAME} -f [OR]
            RewriteCond %{REQUEST_FILENAME} -d
            RewriteRule ^ - [L]

            # Caso contrário, envia tudo para o index.html para o React Router assumir
            RewriteRule ^ index.html [L]
        </IfModule>
    </Directory>

    # Logs específicos para este contexto
    ErrorLog /var/log/httpd/report_error.log
    CustomLog /var/log/httpd/report_access.log combined
</VirtualHost>