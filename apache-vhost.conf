# Arquivo de configuração para o Apache (ex: /etc/httpd/conf.d/report.conf)

<VirtualHost *:80>
    # Altere para o seu domínio ou IP do servidor
    ServerName seu-servidor.petro.local
    
    # O DocumentRoot aponta para onde o link simbólico /var/www/report está localizado
    DocumentRoot "/var/www"

    <Directory "/var/www/report">
        # Permite que o Apache siga o link simbólico para /data/report_g4f/dist
        Options +FollowSymLinks
        
        # Permite que o arquivo .htaccess controle as rotas
        AllowOverride All
        
        # Permite acesso ao diretório
        Require all granted

        # Configuração de fallback para o React Router
        # Isso evita o erro 404 ao atualizar a página em rotas como /dashboard
        <IfModule mod_rewrite.c>
            RewriteEngine On
            RewriteBase /report/
            RewriteRule ^index\.html$ - [L]
            RewriteCond %{REQUEST_FILENAME} !-f
            RewriteCond %{REQUEST_FILENAME} !-d
            RewriteRule . /report/index.html [L]
        </IfModule>
    </Directory>

    # Configurações de Log para facilitar o debug
    ErrorLog /var/log/httpd/report_error.log
    CustomLog /var/log/httpd/report_access.log combined
</VirtualHost>